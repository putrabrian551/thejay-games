<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JAY BEATS SYNTHWAVE</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            background-color: #030008;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            padding: 10px;
        }

        .game-container {
            width: 100%;
            max-width: 450px;
            background: linear-gradient(135deg, #ff007f 0%, #030008 50%, #00f0ff 100%);
            padding: 12px;
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(255, 0, 127, 0.25);
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        .screen-frame {
            width: 100%;
            aspect-ratio: 3 / 4;
            background: #090214;
            border: 4px solid #1a0f30;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 1, 12, 0.96);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .hidden { display: none !important; }

        @keyframes neonPulse {
            0%, 100% { text-shadow: 0 0 12px #ff007f; }
            50% { text-shadow: 0 0 20px #00f0ff; }
        }

        h1 {
            font-size: 2.2rem;
            color: #ffffff;
            animation: neonPulse 2.5s infinite;
            letter-spacing: 4px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #00f0ff;
            font-size: 0.75rem;
            letter-spacing: 5px;
            margin-bottom: 25px;
        }

        .instructions {
            background: rgba(255, 0, 127, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.25);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 25px;
            width: 100%;
        }

        .instructions p {
            font-size: 0.85rem;
            color: #d8b4fe;
            margin: 5px 0;
        }

        .btn {
            background: linear-gradient(90deg, #ff007f, #00f0ff);
            border: none;
            color: white;
            padding: 12px 45px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
            transition: transform 0.1s;
        }
        
        .btn:active {
            transform: scale(0.95);
        }

        .pc-keys-guide {
            display: flex;
            justify-content: space-around;
            width: 100%;
            padding: 0 10px;
        }
        .key-cap {
            background: #0f0720;
            border: 2px solid #2a164d;
            color: #a78bfa;
            padding: 6px 18px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        @media (min-width: 600px) {
            h1 { font-size: 2.6rem; }
            .game-container { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="screen-frame">
            <div id="startScreen" class="overlay">
                <h1>JAY BEATS SYNTHWAVE</h1>
                <div class="subtitle">SYNTHWAVE EDITION</div>
                
                <div class="instructions">
                    <p style="color: #ffb703; font-weight: bold; margin-bottom: 6px;">Game Rules</p>
                    <p>• Hit notes exactly on the <b>Hit Line</b></p>
                    <p>• Don't let your <b>Health Bar</b> drop to 0</p>
                    <p>• <b>PC Keys:</b> D | F | J  (or tap Mobile lanes)</p>
                </div>
                
                <button class="btn" id="startBtn">START GAME</button>
            </div>

            <div id="gameOverScreen" class="overlay hidden">
                <h2 id="endTitle" style="font-size: 2rem; margin-bottom: 10px;">GAME OVER</h2>
                <div style="font-size: 1rem; color: #d8b4fe; margin-bottom: 20px;">
                    <p>Total Score: <span id="finalScore" style="color: #fff; font-weight: bold;">0</span></p>
                    <p>Max Combo: <span id="maxComboDisplay" style="color: #00f0ff; font-weight: bold;">0</span></p>
                </div>
                <button class="btn" id="restartBtn">TRY AGAIN</button>
            </div>

            <canvas id="gameCanvas" width="450" height="600"></canvas>
        </div>

        <div class="pc-keys-guide">
            <div class="key-cap" style="border-color: rgba(255, 0, 127, 0.4); color: #ff007f;">D</div>
            <div class="key-cap" style="border-color: rgba(0, 240, 255, 0.4); color: #00f0ff;">F</div>
            <div class="key-cap" style="border-color: rgba(255, 183, 3, 0.4); color: #ffb703;">J</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const finalScoreTxt = document.getElementById('finalScore');
        const maxComboDisplay = document.getElementById('maxComboDisplay');
        const endTitle = document.getElementById('endTitle');

        let gameActive = false;
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let health = 100;
        let notes = [];
        let nextNoteTime = 0;

        let accuracyText = "";
        let accuracyColor = "#fff";
        let accuracyTimer = 0;

        const LANE_WIDTH = canvas.width / 3;
        const LANES_X = [0, LANE_WIDTH, LANE_WIDTH * 2];
        const HIT_LINE_Y = 510; 
        const NOTE_RADIUS = 23;

        // Skema Warna Khas Jalur (Pink, Cyan, Yellow Gold)
        const LANE_COLORS = ['#ff007f', '#00f0ff', '#ffb703'];
        let laneFlashes = [false, false, false];

        let audioCtx = null;
        let bgmInterval = null;
        let beatCount = 0;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playBackgroundBeat() {
            if (!audioCtx || !gameActive) return;
            try {
                // Kick Drum
                const kickOsc = audioCtx.createOscillator();
                const kickGain = audioCtx.createGain();
                kickOsc.connect(kickGain); kickGain.connect(audioCtx.destination);
                kickOsc.frequency.setValueAtTime(110, audioCtx.currentTime);
                kickOsc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.16);
                kickGain.gain.setValueAtTime(0.22, audioCtx.currentTime);
                kickGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.16);
                kickOsc.start(); kickOsc.stop(audioCtx.currentTime + 0.16);

                // Hi-Hat
                if (beatCount % 2 === 0) {
                    const bufferSize = audioCtx.sampleRate * 0.04;
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

                    const noise = audioCtx.createBufferSource();
                    noise.buffer = buffer;
                    const noiseGain = audioCtx.createGain();
                    noise.connect(noiseGain); noiseGain.connect(audioCtx.destination);
                    noiseGain.gain.setValueAtTime(0.025, audioCtx.currentTime);
                    noiseGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.04);
                    noise.start(); noise.stop(audioCtx.currentTime + 0.04);
                }
                beatCount++;
            } catch (e) {}
        }

        function playNoteSound(lane) {
            if (!audioCtx) return;
            const pentatonicScale = [293.66, 329.63, 392.00]; 
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(pentatonicScale[lane], audioCtx.currentTime);
                gain.gain.setValueAtTime(0.16, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.22);
                osc.start(); osc.stop(audioCtx.currentTime + 0.22);
            } catch(e) {}
        }

        function playMissSound() {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(90, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.12);
                osc.start(); osc.stop(audioCtx.currentTime + 0.12);
            } catch(e) {}
        }

        class Note {
            constructor(lane) {
                this.lane = lane;
                this.x = LANES_X[lane] + LANE_WIDTH / 2;
                this.y = -30;
                this.speed = 5.8;
                this.dead = false;
                this.color = LANE_COLORS[lane];
            }
            update() {
                this.y += this.speed;
                if (this.y > HIT_LINE_Y + 40 && !this.dead) {
                    this.dead = true;
                    triggerMiss();
                }
            }
            draw() {
                ctx.save();
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, NOTE_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, NOTE_RADIUS - 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function triggerMiss() {
            combo = 0;
            health -= 8;
            accuracyText = "MISS";
            accuracyColor = "#ff4d6d";
            accuracyTimer = 35;
            playMissSound();

            if (health <= 0) {
                health = 0;
                triggerGameOver();
            }
        }

        function checkHit(lane) {
            laneFlashes[lane] = true;
            setTimeout(() => laneFlashes[lane] = false, 80);

            if (!gameActive) return;

            for (let i = 0; i < notes.length; i++) {
                let n = notes[i];
                if (n.lane === lane && !n.dead) {
                    let distance = Math.abs(n.y - HIT_LINE_Y);
                    
                    if (distance < 20) { 
    score += 10; 
    combo++;
    health = Math.min(100, health + 4);
    accuracyText = "PERFECT!";
    accuracyColor = "#00f0ff";
    accuracyTimer = 30;
    playNoteSound(lane);
    n.dead = true;
    break;
} else if (distance < 40) { 
    score += 5; 
    combo++;
    health = Math.min(100, health + 2);
    accuracyText = "GREAT";
    accuracyColor = "#ffb703";
    accuracyTimer = 30;
    playNoteSound(lane);
    n.dead = true;
    break;
}
                }
            }

            if (combo > maxCombo) maxCombo = combo;
        }

        function triggerGameOver() {
            gameActive = false;
            clearInterval(bgmInterval);
            finalScoreTxt.innerText = score;
            maxComboDisplay.innerText = maxCombo;
            endTitle.innerText = health <= 0 ? "GAME OVER" : "STAGE CLEAR";
            endTitle.style.color = health <= 0 ? "#ff4d6d" : "#00f0ff";
            gameOverScreen.classList.remove('hidden');
        }

        function startNewGame() {
            notes = [];
            score = 0;
            combo = 0;
            maxCombo = 0;
            health = 100;
            accuracyText = "";
            gameActive = true;
            nextNoteTime = 0;
            beatCount = 0;

            if (bgmInterval) clearInterval(bgmInterval);
            bgmInterval = setInterval(playBackgroundBeat, 450);
        }

        function loop(timestamp) {
            ctx.fillStyle = '#090214';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
            ctx.lineWidth = 3;
            for (let i = 1; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(LANE_WIDTH * i, 0);
                ctx.lineTo(LANE_WIDTH * i, canvas.height);
                ctx.stroke();
            }

            for (let i = 0; i < 3; i++) {
                if (laneFlashes[i]) {
                    let grad = ctx.createLinearGradient(0, canvas.height, 0, 0);
                    grad.addColorStop(0, LANE_COLORS[i] + '44'); // 44 itu opacity hex
                    grad.addColorStop(1, LANE_COLORS[i] + '00');
                    ctx.fillStyle = grad;
                    ctx.fillRect(LANES_X[i], 0, LANE_WIDTH, canvas.height);
                }
            }

            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.fillRect(20, 60, canvas.width - 40, 8);
            ctx.save();
            let healthColor = health > 30 ? '#00f0ff' : '#ff007f';
            ctx.shadowColor = healthColor;
            ctx.shadowBlur = 8;
            ctx.fillStyle = healthColor;
            ctx.fillRect(20, 60, (canvas.width - 40) * (health / 100), 8);
            ctx.restore();

            ctx.save();
            ctx.strokeStyle = '#2a164d';
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, HIT_LINE_Y); ctx.lineTo(canvas.width, HIT_LINE_Y); ctx.stroke();
            ctx.restore();

            for (let i = 0; i < 3; i++) {
                ctx.save();
                let ringColor = laneFlashes[i] ? '#fff' : LANE_COLORS[i] + '66';
                ctx.strokeStyle = ringColor;
                if (laneFlashes[i]) { ctx.shadowColor = LANE_COLORS[i]; ctx.shadowBlur = 10; }
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.arc(LANES_X[i] + LANE_WIDTH / 2, HIT_LINE_Y, NOTE_RADIUS + 4, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            if (gameActive) {
                if (timestamp > nextNoteTime) {
                    let randomLane = Math.floor(Math.random() * 3);
                    notes.push(new Note(randomLane));
                    nextNoteTime = timestamp + (Math.random() < 0.35 ? 450 : 900); 
                }

                for (let i = notes.length - 1; i >= 0; i--) {
                    let n = notes[i];
                    n.update();
                    n.draw();
                    if (n.dead) notes.splice(i, 1);
                }
            }

            if (accuracyTimer > 0) {
                accuracyTimer--;
                ctx.save();
                ctx.fillStyle = accuracyColor;
                ctx.font = "italic bold 30px 'Segoe UI', Arial";
                ctx.textAlign = "center";
                ctx.shadowColor = accuracyColor;
                ctx.shadowBlur = 12;
                ctx.fillText(accuracyText, canvas.width / 2, canvas.height / 2 - 40);
                ctx.restore();
            }

            // Angka Combo Counter
            if (combo >= 2) {
                ctx.save();
                ctx.fillStyle = '#fff';
                ctx.font = "bold 26px 'Segoe UI', Arial";
                ctx.textAlign = "center";
                ctx.fillText(`${combo}`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillStyle = '#a78bfa';
                ctx.font = "bold 11px 'Segoe UI', Arial";
                ctx.letterSpacing = "2px";
                ctx.fillText("COMBO", canvas.width / 2, canvas.height / 2 + 38);
                ctx.restore();
            }

            // Papan Skor
            ctx.fillStyle = '#fff';
            ctx.font = "bold 18px 'Segoe UI', Arial";
            ctx.fillText(`SCORE: ${score}`, 20, 45);

            requestAnimationFrame(loop);
        }

        window.addEventListener('keydown', (e) => {
            initAudio();
            if (e.repeat) return; 
            if (e.key === 'd' || e.key === 'D') checkHit(0);
            if (e.key === 'f' || e.key === 'F') checkHit(1);
            if (e.key === 'j' || e.key === 'J') checkHit(2);
        });

        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            initAudio();
            const rect = canvas.getBoundingClientRect();
            const clickX = ((e.clientX - rect.left) / rect.width) * canvas.width;
            
            if (clickX < LANE_WIDTH) checkHit(0);
            else if (clickX < LANE_WIDTH * 2) checkHit(1);
            else checkHit(2);
        });

        startBtn.addEventListener('click', () => {
            initAudio();
            startScreen.classList.add('hidden');
            startNewGame();
        });

        restartBtn.addEventListener('click', () => {
            initAudio();
            gameOverScreen.classList.add('hidden');
            startNewGame();
        });

        requestAnimationFrame(loop);
    </script>
</body>
</html>
