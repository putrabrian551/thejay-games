<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JAY CUP SHUFFLE</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#220033;
color:white;
overflow:hidden;
touch-action:manipulation;
}

.screen,
.game{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
text-align:center;
}

.hidden{
display:none;
}

h1{
color:#d28cff;
margin-bottom:15px;
}

p{
max-width:500px;
line-height:1.6;
}

button{
background:#8a2be2;
color:white;
border:none;
padding:14px 26px;
font-size:18px;
border-radius:14px;
cursor:pointer;
margin:8px;
transition:.2s;
}

button:active{
transform:scale(.95);
}

#hud{
position:absolute;
top:10px;
left:10px;
right:10px;

display:flex;
justify-content:space-between;
gap:10px;

z-index:100;
}

.hud-box{

flex:1;

background:rgba(255,255,255,.08);

backdrop-filter:blur(8px);

border:1px solid rgba(255,255,255,.15);

border-radius:18px;

padding:10px;

box-shadow:
0 8px 20px rgba(0,0,0,.3);

}

.hud-label{
font-size:12px;
color:#d8b6ff;
text-transform:uppercase;
letter-spacing:1px;
}

.hud-value{
font-size:22px;
font-weight:bold;
margin-top:4px;
color:white;
}

#cups{
position:relative;
width:100%;
height:350px;
}

.cup{
position:absolute;

width:95px;
height:120px;

background:
linear-gradient(
180deg,
#f0c8ff 0%,
#c77dff 25%,
#8a2be2 70%,
#5a189a 100%
);

border-top:10px solid #fff;

border-radius:
12px 12px 50px 50px;

box-shadow:
0 15px 30px rgba(0,0,0,.45),
inset 0 5px 10px rgba(255,255,255,.25);

transition:
left .5s ease,
transform .5s ease;

z-index:2;

overflow:hidden;
}
.cup::before{
content:"";

position:absolute;

left:12px;
top:10px;

width:18px;
height:80px;

background:
rgba(255,255,255,.25);

border-radius:20px;

transform:rotate(10deg);
}
.cup:hover{
filter:brightness(1.15);
}
.ball{
position:absolute;

width:24px;
height:24px;

background:white;

border-radius:50%;

left:50%;
bottom:-12px;

transform:
translateX(-50%);

box-shadow:
0 0 18px white;

opacity:0;

transition:.3s;
}

.lift{
transform:
translateY(-90px)
scale(1.05);

filter:
drop-shadow(
0 15px 20px rgba(0,0,0,.4)
);
}

#msg{
position:absolute;
top:45%;
font-size:34px;
font-weight:bold;
display:none;
color:white;
text-shadow:0 0 20px white;
}

.scorePop{
animation:pop .4s ease;
}

@keyframes pop{
0%{transform:scale(1)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}
}

#score{
color:#fff;
text-shadow:
0 0 10px #fff,
0 0 20px #c77dff,
0 0 30px #c77dff;
}
.scorePop{
animation:scorePop .4s ease;
}

@keyframes scorePop{

0%{
transform:scale(1);
}

50%{
transform:scale(1.3);
}

100%{
transform:scale(1);
}

}
#cups::after{
content:"";

position:absolute;

left:50%;
bottom:40px;

transform:translateX(-50%);

width:85%;
height:18px;

background:
rgba(255,255,255,.08);

border-radius:50%;

filter:blur(8px);
}
.start-card{

width:100%;
max-width:420px;

padding:30px;

border-radius:30px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(12px);

border:
1px solid rgba(255,255,255,.15);

box-shadow:
0 20px 40px rgba(0,0,0,.4);

animation:
fadeIn .8s ease;
}

.logo{

font-size:70px;

margin-bottom:10px;

animation:
floatLogo 2s infinite ease-in-out;
}

.game-title{

font-size:38px;

margin-bottom:10px;

color:white;

text-shadow:
0 0 15px #c77dff,
0 0 30px #c77dff;
}

.subtitle{

opacity:.85;

margin-bottom:20px;
}

.info-box{

padding:15px;

margin:20px 0;

border-radius:18px;

background:
rgba(255,255,255,.05);

line-height:2;
}

.best-front{

font-size:22px;

font-weight:bold;

margin-bottom:20px;

color:#ffd700;
}

.start-btn{

width:100%;

font-size:22px;

font-weight:bold;

padding:16px;

background:
linear-gradient(
90deg,
#c77dff,
#8a2be2
);

box-shadow:
0 0 20px rgba(199,125,255,.6);
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes floatLogo{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0);
}

}
</style>
</head>

<body>

<div id="start" class="screen">

<div class="start-card">

<div class="logo">
🎲
</div>

<h1 class="game-title">
JAY CUP SHUFFLE
</h1>

<div class="subtitle">
Track the hidden ball and test your memory.
</div>

<div class="info-box">

👀 Watch Carefully<br>
🎯 Pick The Correct Cup<br>
❌ One Mistake = Game Over

</div>

<div class="best-front">
🏆 Best Score:
<span id="frontBest">0</span>
</div>

<button class="start-btn" onclick="startGame()">
▶ START GAME
</button>

<button onclick="toggleSound()" id="soundBtn">
🔊 Sound On
</button>

</div>

</div>

<div id="game" class="game hidden">

<div id="hud">

<div class="hud-box">
<div class="hud-label">LEVEL</div>
<div class="hud-value" id="round">1</div>
</div>

<div class="hud-box">
<div class="hud-label">SCORE</div>
<div class="hud-value" id="score">0</div>
</div>

<div class="hud-box">
<div class="hud-label">BEST</div>
<div class="hud-value" id="best">0</div>
</div>

</div>

<div id="cups"></div>

<div id="msg"></div>

</div>

<div id="over" class="screen hidden">

<h1>GAME OVER</h1>

<p id="overText"></p>

<button onclick="restart()">
PLAY AGAIN
</button>

</div>

<script>

let round=1;
let score=0;

let best =
Number(localStorage.getItem("jayBest")) || 0;
window.onload = () => {

    updateHUD();

};
window.onload = () => {

    const frontBest =
    document.getElementById("frontBest");

    if(frontBest){
        frontBest.textContent = best;
    }

};

let cups=[];
let ballCup=0;

let canPick=false;
let sound=true;

function beep(freq,duration){

if(!sound) return;

const ctx=
new(
window.AudioContext||
window.webkitAudioContext
)();

const osc=
ctx.createOscillator();

const gain=
ctx.createGain();

osc.connect(gain);
gain.connect(ctx.destination);

osc.frequency.value=freq;

osc.start();

gain.gain.exponentialRampToValueAtTime(
0.0001,
ctx.currentTime+
duration/1000
);

osc.stop(
ctx.currentTime+
duration/1000
);

}

function toggleSound(){

sound=!sound;

document.getElementById(
"soundBtn"
).textContent=

sound
?
"🔊 Sound On"
:
"🔇 Sound Off";

}

function startGame(){

document
.getElementById("start")
.classList.add("hidden");

document
.getElementById("game")
.classList.remove("hidden");

updateHUD();

setupRound();

}

function updateHUD(){

    document.getElementById("round").textContent = round;

    document.getElementById("score").textContent = score;

    document.getElementById("best").textContent = best;

    const frontBest =
    document.getElementById("frontBest");

    if(frontBest){
        frontBest.textContent = best;
    }

}

function getCupCount(){

if(round===1) return 2;
if(round===2) return 3;
if(round===3) return 4;

return 5;

}

function setupRound(){

canPick=false;

const wrap=
document.getElementById(
"cups"
);

wrap.innerHTML="";

cups=[];

const count=
getCupCount();

const spacing=
Math.min(
110,
window.innerWidth/(count+1)
);

const startX=
(window.innerWidth-
(spacing*(count-1)+90))
/2;

for(let i=0;i<count;i++){

const cup=
document.createElement("div");

cup.className="cup";

cup.style.left=
(startX+i*spacing)+"px";

cup.style.top="120px";

cup.dataset.index = i;

cup.onclick = function(){
    pick(cups.indexOf(this));
};

const ball=
document.createElement("div");

ball.className="ball";

cup.appendChild(ball);

wrap.appendChild(cup);

cups.push(cup);

}

ballCup=
Math.floor(
Math.random()*count
);

cups[ballCup]
.querySelector(".ball")
.style.opacity="1";

setTimeout(()=>{

cups[ballCup]
.querySelector(".ball")
.style.opacity="0";

shuffle();

},1500);

}

async function shuffle(){

let moves=
5+(round*2);

let speed=
Math.max(
120,
500-(round*25)
);

for(let m=0;m<moves;m++){

beep(450,40);

let a=
Math.floor(
Math.random()*cups.length
);

let b=
Math.floor(
Math.random()*cups.length
);

while(a===b){

b=
Math.floor(
Math.random()*cups.length
);

}

const leftA=
cups[a].style.left;

cups[a].style.left=
cups[b].style.left;

cups[b].style.left=
leftA;

[cups[a],cups[b]]
=
[cups[b],cups[a]];

if(ballCup===a){

ballCup=b;

}
else if(ballCup===b){

ballCup=a;

}

await new Promise(r=>
setTimeout(r,speed)
);

}

canPick=true;

}

function pick(index){

    if(!canPick) return;

    canPick = false;

    cups[ballCup]
        .classList.add("lift");

    cups[ballCup]
        .querySelector(".ball")
        .style.opacity = "1";

    const correctCup = cups[ballCup];

    if(cups[index] === correctCup){

        score += 35;

if(score > best){
    best = score;
    localStorage.setItem("jayBest", best);
}

updateHUD();

        beep(850,150);

        showMsg(
            Math.random() > .5
            ? "CORRECT!"
            : "NICE!"
        );

        round++;

        setTimeout(
            setupRound,
            1200
        );

    }else{

        beep(180,500);

        setTimeout(
            gameOver,
            1000
        );

    }
}
function showMsg(text){

const msg=
document.getElementById(
"msg"
);

msg.textContent=text;

msg.style.display=
"block";

setTimeout(()=>{

msg.style.display=
"none";

},1000);

}

function gameOver(){

document
.getElementById("game")
.classList.add("hidden");

document
.getElementById("over")
.classList.remove("hidden");

document
.getElementById("overText")
.innerHTML=

"Round Reached: "
+round+

"<br><br>Final Score: "
+score+

"<br><br>Best Score: "
+best;

}

function restart(){

round=1;
score=0;

document
.getElementById("over")
.classList.add("hidden");

document
.getElementById("game")
.classList.remove("hidden");

updateHUD();

setupRound();

}

</script>

</body>
</html>
