<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎾 Tennis Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f1923;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #eee;
    overflow: hidden;
  }
  h1 {
    font-size: 1.5rem;
    letter-spacing: 6px;
    color: #f7c948;
    margin-bottom: 8px;
    text-shadow: 0 0 20px #f7c94880;
  }
  #hud {
    display: flex;
    align-items: center;
    gap: 30px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 8px 24px;
  }
  .hud-block { text-align: center; }
  .hud-label { font-size: 0.65rem; color: #888; letter-spacing: 2px; text-transform: uppercase; }
  .hud-val { font-size: 1.8rem; font-weight: bold; color: #f7c948; text-shadow: 0 0 8px #f7c94880; line-height: 1; }
  .hud-sep { color: #333; font-size: 1.4rem; }
  #lives-display { display: flex; gap: 5px; justify-content: center; margin-top: 2px; }
  .heart { font-size: 1.1rem; transition: all 0.3s; }
  .heart.lost { opacity: 0.2; filter: grayscale(1); }
  #canvas-wrap {
    position: relative;
    border: 3px solid #4caf7d;
    border-radius: 8px;
    box-shadow: 0 0 50px #4caf7d33, 0 0 100px #4caf7d11;
  }
  canvas { display: block; background: #2a5225; }
  #info {
    margin-top: 8px;
    font-size: 0.75rem;
    color: #555;
    letter-spacing: 1px;
  }
  /* Overlay */
  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(5,10,20,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    z-index: 10;
  }

  /* START screen stays simple */
  #overlay.start-screen h2 { font-size: 2.2rem; color: #f7c948; letter-spacing: 5px; margin-bottom: 6px; }
  #overlay.start-screen .sub { color: #aaa; font-size: 0.85rem; margin-bottom: 16px; }

  /* GAME OVER card box */
  .go-box {
    background: #0d1a12;
    border: 2px solid #4caf7d;
    border-radius: 14px;
    padding: 26px 34px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 430px;
    max-width: 90%;
    box-shadow: 0 0 50px #4caf7d25, inset 0 0 60px rgba(0,0,0,0.3);
  }

  .go-skull {
    font-size: 2.6rem;
    line-height: 1;
    margin-bottom: 4px;
    filter: grayscale(1) brightness(2.5);
  }

  .go-title {
    font-size: 2.5rem;
    font-weight: bold;
    letter-spacing: 8px;
    color: #f7c948;
    text-shadow: 0 0 20px #f7c94860;
    margin-bottom: 10px;
    text-transform: uppercase;
    text-align: center;
  }

  /* Star divider */
  .go-divider {
    display: flex;
    align-items: center;
    width: 100%;
    gap: 8px;
    margin-bottom: 10px;
  }
  .go-divider-line {
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.15);
  }
  .go-divider-star { color: #555; font-size: 0.75rem; }

  .go-sub {
    color: #aaa;
    font-size: 0.82rem;
    margin-bottom: 16px;
    text-align: center;
    font-style: italic;
  }

  /* Desktop: 3-column horizontal stats */
  .go-stats-desktop {
    display: flex;
    width: 100%;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  /* Desktop: stats top, button below full width */
  .go-bottom-desktop {
    display: flex;
    flex-direction: column;
    width: 100%;
    align-items: stretch;
  }
  .go-bottom-desktop .go-stats-desktop {
    margin-bottom: 14px;
  }
  .go-bottom-desktop .btn {
    width: 100% !important;
    padding: 13px 0 !important;
  }
  .go-col {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
  }
  .go-col:first-child { flex: 1.7; }
  .go-col:nth-child(2), .go-col:nth-child(3) { flex: 0.65; }
  .go-col:last-child { border-right: none; }
  .go-col-label {
    font-size: 0.58rem;
    letter-spacing: 2px;
    color: #4caf7d;
    text-transform: uppercase;
    margin-bottom: 5px;
    font-weight: bold;
  }
  .go-col-val {
    font-size: 1rem;
    color: #ddd;
    font-family: 'Courier New', monospace;
    line-height: 1.3;
    white-space: nowrap;
  }
  .go-col-val strong { color: #f7c948; font-size: 1.2rem; }
  .go-col:first-child .go-col-val { font-size: 0.9rem; }
  .go-col:first-child .go-col-val strong { font-size: 1.05rem; }

  /* Mobile: vertical rows with icons */
  .go-stats-mobile {
    display: none;
    flex-direction: column;
    width: 100%;
    gap: 7px;
    margin-bottom: 16px;
  }
  .go-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 10px 14px;
  }
  .go-row-icon { font-size: 1.3rem; width: 26px; text-align: center; flex-shrink: 0; }
  .go-row-info { display: flex; flex-direction: column; }
  .go-row-label {
    font-size: 0.58rem;
    letter-spacing: 2px;
    color: #4caf7d;
    text-transform: uppercase;
    font-weight: bold;
    margin-bottom: 1px;
  }
  .go-row-val { font-size: 0.95rem; color: #ddd; font-family: 'Courier New', monospace; }
  .go-row-val strong { color: #f7c948; font-size: 1.1rem; }

  .btn {
    background: #4caf7d;
    border: none;
    color: #fff;
    padding: 12px 36px;
    width: auto;
    font-size: 0.9rem;
    letter-spacing: 5px;
    border-radius: 7px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    transition: all 0.2s;
    text-transform: uppercase;
    box-shadow: 0 4px 16px #4caf7d40;
    margin-top: 0;
  }
  /* Play Again in game-over box stays full width */
  .go-box .btn {
    width: 100%;
    padding: 13px 0;
  }
  .btn:hover {
    background: #5dcc92;
    box-shadow: 0 0 28px #4caf7d80;
    transform: translateY(-1px);
  }
  /* Floating +10 text */
  .float-text {
    position: absolute;
    font-size: 1.1rem;
    font-weight: bold;
    color: #f7c948;
    pointer-events: none;
    animation: floatUp 0.9s ease-out forwards;
    text-shadow: 0 0 8px #f7c948;
    font-family: 'Courier New', monospace;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1.2); }
    100% { opacity: 0; transform: translateY(-50px) scale(0.8); }
  }

@media (max-width: 768px){
  #canvas-wrap{
    width: calc(100vw - 12px);
    max-width: 700px;
  }
  canvas{
    width:100%;
    height:auto;
    display:block;
  }
  #hud{
    gap:12px;
    padding:6px 10px;
    flex-wrap:wrap;
  }
  .hud-val{font-size:1.4rem;}
  .hud-label{font-size:0.55rem;}
  #info{
    font-size:0.65rem;
    text-align:center;
    padding:0 6px;
  }
}


@media (max-width:768px){
  #hud{
    display:grid !important;
    grid-template-columns:1fr 1fr 2fr 1fr 1fr !important;
    gap:4px !important;
    align-items:center !important;
  }
  .hud-sep{display:none !important;}
  .hud-label{font-size:10px !important;}
  .hud-val{font-size:18px !important;}
}


/* GAME OVER responsive */
.go-mobile-btn { display: none; }
@media (max-width:768px){
  .go-box { padding: 20px 16px 18px !important; }
  .go-title { font-size: 2rem !important; letter-spacing: 5px !important; }
  .go-bottom-desktop { display: none !important; }
  .go-stats-mobile { display: flex !important; }
  .go-mobile-btn { display: block !important; width: 100% !important; padding: 13px 0 !important; margin-top: 4px; }
}

</style>
</head>
<body>

<h1>🎾 TENNIS</h1>

<div id="hud">
  <div class="hud-block">
    <div class="hud-label">Player</div>
    <div class="hud-val" id="hudPlayerScore">0</div>
  </div>
  <div class="hud-sep">:</div>
  <div class="hud-block">
    <div class="hud-label">AI</div>
    <div class="hud-val" id="hudAIScore">0</div>
  </div>
  <div class="hud-sep">|</div>
  <div class="hud-block">
    <div class="hud-label">Lives</div>
    <div id="lives-display">
      <span class="heart" id="h1">❤️</span>
      <span class="heart" id="h2">❤️</span>
      <span class="heart" id="h3">❤️</span>
      <span class="heart" id="h4">❤️</span>
      <span class="heart" id="h5">❤️</span>
    </div>
  </div>
  <div class="hud-sep">|</div>
  <div class="hud-block">
    <div class="hud-label">Level</div>
    <div class="hud-val" id="hudLevel">1</div>
  </div>
  <div class="hud-sep">|</div>
  <div class="hud-block">
    <div class="hud-label">Point</div>
    <div class="hud-val" id="hudHits">0</div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="c" width="700" height="400"></canvas>
  <div id="overlay" class="start-screen">
    <h2 id="overlayTitle">TENNIS</h2>
    <p class="sub" id="overlaySub">Move your mouse to control the player</p>
    <button class="btn" id="startBtn">START GAME</button>
  </div>
</div>

<div id="info">🖱 Mouse / Touch screen to move &nbsp;|&nbsp; Return ball = +10 Points | AI misses = Player +1</div>

<script>
// ========== AUDIO ENGINE ==========
const AC = window.AudioContext || window.webkitAudioContext;
let ac;
function getAC() { if (!ac) ac = new AC(); return ac; }

function playHit(freq = 440, type = 'sine', dur = 0.12, vol = 0.4) {
  try {
    const a = getAC();
    const osc = a.createOscillator();
    const gain = a.createGain();
    osc.connect(gain); gain.connect(a.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, a.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.6, a.currentTime + dur);
    gain.gain.setValueAtTime(vol, a.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    osc.start(); osc.stop(a.currentTime + dur);
  } catch(e){}
}

function soundBounce()  { playHit(520, 'triangle', 0.1, 0.35); }
function soundWall()    { playHit(300, 'sine', 0.08, 0.25); }
function soundScore()   {
  // +10 ascending notes
  [523, 659, 784].forEach((f, i) => {
    setTimeout(() => playHit(f, 'sine', 0.15, 0.3), i * 80);
  });
}
function soundLoseLife() {
  // Descending sad notes
  [400, 320, 220].forEach((f, i) => {
    setTimeout(() => playHit(f, 'sawtooth', 0.18, 0.25), i * 100);
  });
}
function soundGameOver() {
  [300, 250, 180, 120].forEach((f, i) => {
    setTimeout(() => playHit(f, 'sawtooth', 0.25, 0.35), i * 130);
  });
}
function soundLevelUp() {
  [523, 659, 784, 1047].forEach((f, i) => {
    setTimeout(() => playHit(f, 'sine', 0.18, 0.4), i * 70);
  });
}

// ========== GAME SETUP ==========

const ctx = canvas.getContext('2d');

let playerScore = 0, aiScore = 0, lives = 5, hits = 0, level = 1;
let running = false, gameOver = false;
let baseSpeed = 4.5;

let lp = { x: 30, y: H/2 - PADDLE_H/2 };
let rp = { x: W - 30 - PADDLE_W, y: H/2 - PADDLE_H/2 };
let ball = { x: W/2, y: H/2, vx: baseSpeed, vy: 3 };
let playerTarget = H/2;
let cpuSpeed = 3.8;

// CPU "brain" — delayed & imperfect tracking
let cpuTargetY = H/2;         // where CPU thinks ball will be
let cpuReactionDelay = 0;     // frames before CPU reacts
let cpuErrorOffset = 0;       // intentional aiming error
let cpuMissChance = 0.30;     // 30% chance to miss at level 1

// Flash effects
let flashTimer = 0, flashColor = 'red';
let shakeTimer = 0;
// Floating texts
let floatTexts = [];
// Screen shake offset
let shakeX = 0, shakeY = 0;

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function resetBall(dir = 1) {
  ball.x = W/2; ball.y = H/2;
  const angle = (Math.random() * 0.5 - 0.25);
  const spd = baseSpeed + (level - 1) * 0.5;
  ball.vx = dir * spd;
  ball.vy = Math.sin(angle) * (spd * 0.7);
  // Reset CPU tracking
  cpuTargetY = H/2;
  cpuErrorOffset = (Math.random() - 0.5) * 50; // start with some error
  cpuReactionDelay = 10; // CPU starts slow
}

function updateLivesUI() {
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById('h'+i);
    if (i > lives) el.classList.add('lost');
    else el.classList.remove('lost');
  }
}

function addFloat(x, y, text) {
  const wrap = document.getElementById('canvas-wrap');
  const rect = canvas.getBoundingClientRect();
  const wRect = wrap.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  // Position relative to canvas-wrap
  const scaleX = rect.width / W;
  const scaleY = rect.height / H;
  el.style.left = (x * scaleX + 3) + 'px';
  el.style.top  = (y * scaleY - 10) + 'px';
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 950);
}

function triggerShake() { shakeTimer = 12; }
function triggerFlash(color) { flashTimer = 18; flashColor = color; }

// ========== CONTROLS ==========
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  playerTarget = (e.clientY - rect.top) * (H / rect.height);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  playerTarget = (e.touches[0].clientY - rect.top) * (H / rect.height);
}, { passive: false });

// ========== UPDATE ==========
let swingTimer = 0;

function update() {
  // Player paddle
  const dy = playerTarget - (lp.y + PADDLE_H/2);
  lp.y += clamp(dy, -8, 8);
  lp.y = clamp(lp.y, 0, H - PADDLE_H);

  // CPU AI — manusiawi: ada delay reaksi, error aiming, kadang miss
  if (ball.vx > 0) {
    // Bola menuju CPU
    if (cpuReactionDelay > 0) {
      cpuReactionDelay--;
    } else {
      cpuTargetY = ball.y + cpuErrorOffset;
      if (Math.random() < 0.04) {
        const missRange = Math.max(15, 70 - level * 6);
        cpuErrorOffset = (Math.random() - 0.5) * missRange;
        cpuReactionDelay = Math.max(0, Math.floor(6 - level * 0.5));
      }
    }
  } else {
    // Bola menjauh — CPU balik ke tengah pelan-pelan
    cpuTargetY = H / 2;
    cpuErrorOffset *= 0.92;
  }

  const cpuEffective = Math.min(2.8 + level * 0.35, 6.5);
  const cpuCenter = rp.y + PADDLE_H / 2;
  const cpuDy = cpuTargetY - cpuCenter;
  rp.y += clamp(cpuDy, -cpuEffective, cpuEffective);
  rp.y = clamp(rp.y, 0, H - PADDLE_H);

  // Ball movement
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall bounce (top/bottom)
  if (ball.y - BALL_R < 0) { ball.y = BALL_R; ball.vy *= -1; soundWall(); }
  if (ball.y + BALL_R > H) { ball.y = H - BALL_R; ball.vy *= -1; soundWall(); }

  // Left paddle hit (PLAYER)
  if (ball.vx < 0 &&
      ball.x - BALL_R < lp.x + PADDLE_W &&
      ball.x + BALL_R > lp.x &&
      ball.y + BALL_R > lp.y &&
      ball.y - BALL_R < lp.y + PADDLE_H) {

    ball.x = lp.x + PADDLE_W + BALL_R;
    const hit = (ball.y - (lp.y + PADDLE_H/2)) / (PADDLE_H/2);
    ball.vy = hit * 6;
    ball.vx = Math.abs(ball.vx) * 1.04;

    // Tambah kembalian + 10 point
    hits += 10;
    document.getElementById('hudHits').textContent = hits;
    soundBounce();
    soundScore();
    addFloat(lp.x + PADDLE_W + 10, lp.y, '+10');

    // Level up every 50 points
    const newLevel = Math.floor(hits / 50) + 1;
    if (newLevel > level) {
      level = newLevel;
      baseSpeed = 4.5 + (level - 1) * 0.5;
      document.getElementById('hudLevel').textContent = level;
      soundLevelUp();
      triggerFlash('gold');
    }
  }

  // Right paddle hit (CPU)
  if (ball.vx > 0 &&
      ball.x + BALL_R > rp.x &&
      ball.x - BALL_R < rp.x + PADDLE_W &&
      ball.y + BALL_R > rp.y &&
      ball.y - BALL_R < rp.y + PADDLE_H) {
    ball.x = rp.x - BALL_R;
    const hit = (ball.y - (rp.y + PADDLE_H/2)) / (PADDLE_H/2);
    ball.vy = hit * 6;
    ball.vx = -Math.abs(ball.vx) * 1.02;
    soundBounce();
  }

  // Ball out LEFT (player missed = AI dapat poin + player kehilangan nyawa)
  if (ball.x + BALL_R < 0) {
    lives--;
    aiScore++;
    updateLivesUI();
    document.getElementById('hudAIScore').textContent = aiScore;
    triggerShake();
    triggerFlash('red');
    addFloat(W/2, H/2, 'AI +1 Score');
    if (lives <= 0) {
      endGame();
      return;
    }
    soundLoseLife();
    resetBall(1);
  }

  // Ball out RIGHT (CPU missed = Player +1 score)
  if (ball.x - BALL_R > W) {
    playerScore++;
    document.getElementById('hudPlayerScore').textContent = playerScore;
    soundScore();
    triggerFlash('gold');
    addFloat(W/2, H/2, 'Player +1 Score');
    resetBall(-1);
  }

  // Cap speed
  const spd = Math.sqrt(ball.vx**2 + ball.vy**2);
  const maxSpd = 16 + level;
  if (spd > maxSpd) { ball.vx *= maxSpd/spd; ball.vy *= maxSpd/spd; }

  // Swing animation
  const nearLeft = ball.x < W * 0.28 && ball.vx < 0;
  const nearRight = ball.x > W * 0.72 && ball.vx > 0;
  if (nearLeft || nearRight) swingTimer += 0.35;
  else swingTimer *= 0.85;

  // Screen shake
  if (shakeTimer > 0) {
    shakeTimer--;
    shakeX = (Math.random() - 0.5) * 6;
    shakeY = (Math.random() - 0.5) * 6;
  } else { shakeX = 0; shakeY = 0; }

  if (flashTimer > 0) flashTimer--;
}

function endGame() {
  running = false;
  gameOver = true;
  soundGameOver();

  const ov = document.getElementById('overlay');
  ov.className = 'gameover-screen';

  // Hide default start elements
  document.getElementById('overlayTitle').style.display = 'none';
  document.getElementById('overlaySub').style.display = 'none';
  document.getElementById('startBtn').style.display = 'none';

  // Remove old go-box if exists (replay)
  const oldBox = document.getElementById('goBox');
  if (oldBox) oldBox.remove();

  // Build the card
  const box = document.createElement('div');
  box.id = 'goBox';
  box.className = 'go-box';
  box.innerHTML = `
    <div class="go-skull">&#x1F480;</div>
    <div class="go-title">GAME OVER</div>
    <div class="go-divider">
      <div class="go-divider-line"></div>
      <span class="go-divider-star">&#9733;</span>
      <div class="go-divider-line"></div>
    </div>
    <div class="go-sub">You lost all 5 lives. Game over!</div>
    <div class="go-bottom-desktop">
      <div class="go-stats-desktop">
        <div class="go-col">
          <div class="go-col-label">Final Score</div>
          <div class="go-col-val">Player <strong>${playerScore}</strong> &ndash; <strong>${aiScore}</strong> AI</div>
        </div>
        <div class="go-col">
          <div class="go-col-label">Level</div>
          <div class="go-col-val"><strong>${level}</strong></div>
        </div>
        <div class="go-col">
          <div class="go-col-label">Points</div>
          <div class="go-col-val"><strong>${hits}</strong></div>
        </div>
      </div>
      <button class="btn" id="playAgainBtn">PLAY AGAIN</button>
    </div>
    <div class="go-stats-mobile">
      <div class="go-row">
        <div class="go-row-icon">&#x1F3C6;</div>
        <div class="go-row-info">
          <div class="go-row-label">Final Score</div>
          <div class="go-row-val">Player <strong>${playerScore}</strong> &ndash; <strong>${aiScore}</strong> AI</div>
        </div>
      </div>
      <div class="go-row">
        <div class="go-row-icon">&#x1F4CA;</div>
        <div class="go-row-info">
          <div class="go-row-label">Level</div>
          <div class="go-row-val"><strong>${level}</strong></div>
        </div>
      </div>
      <div class="go-row">
        <div class="go-row-icon">&#x2B50;</div>
        <div class="go-row-info">
          <div class="go-row-label">Points</div>
          <div class="go-row-val"><strong>${hits}</strong></div>
        </div>
      </div>
    </div>
    <button class="btn go-mobile-btn" id="playAgainBtnMobile">PLAY AGAIN</button>
  `;
  ov.appendChild(box);

  document.getElementById('playAgainBtn').addEventListener('click', startGame);
  const mobileBtn = document.getElementById('playAgainBtnMobile');
  if (mobileBtn) mobileBtn.addEventListener('click', startGame);
  ov.style.display = 'flex';
}

function startGame() {
  playerScore = 0; aiScore = 0; lives = 5; hits = 0; level = 1;
  cpuSpeed = 3.8; baseSpeed = 4.5;
  gameOver = false;
  document.getElementById('hudPlayerScore').textContent = '0';
  document.getElementById('hudAIScore').textContent = '0';
  document.getElementById('hudHits').textContent = '0';
  document.getElementById('hudLevel').textContent = '1';
  updateLivesUI();

  // Reset overlay to clean state
  const ov = document.getElementById('overlay');
  ov.className = 'start-screen';
  const oldBox = document.getElementById('goBox');
  if (oldBox) oldBox.remove();
  document.getElementById('overlayTitle').style.display = '';
  document.getElementById('overlaySub').style.display = '';
  document.getElementById('startBtn').style.display = '';
  ov.style.display = 'none';
  lp.y = H/2 - PADDLE_H/2;
  rp.y = H/2 - PADDLE_H/2;
  running = true;
  resetBall(1);
  loop();
}

document.getElementById('startBtn').addEventListener('click', startGame);

// ========== DRAWING ==========

function drawCourt() {
  // Surface
  for (let i = 0; i < 4; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#2a5225' : '#2e5929';
    ctx.fillRect(i * (W/4), 0, W/4, H);
  }

  // Court lines
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 2;
  ctx.setLineDash([]);
  ctx.strokeRect(6, 6, W-12, H-12);

  ctx.setLineDash([8, 10]);
  ctx.lineWidth = 1.5;
  // Service lines
  ctx.beginPath();
  ctx.moveTo(W*0.25, 6); ctx.lineTo(W*0.25, H-6);
  ctx.moveTo(W*0.75, 6); ctx.lineTo(W*0.75, H-6);
  ctx.stroke();
  // Center horizontal
  ctx.beginPath();
  ctx.moveTo(W*0.25, H/2); ctx.lineTo(W*0.75, H/2);
  ctx.stroke();
  ctx.setLineDash([]);

  // ===== NET (prominent) =====
  const NX = W/2;
  const NW = 10; // wider net
  // Net shadow/glow
  ctx.shadowColor = 'rgba(255,255,255,0.4)';
  ctx.shadowBlur = 8;

  // Net main body with mesh pattern
  ctx.fillStyle = 'rgba(220,220,220,0.9)';
  ctx.fillRect(NX - NW/2, 0, NW, H);

  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';

  // Net mesh lines (horizontal)
  ctx.strokeStyle = 'rgba(160,160,160,0.7)';
  ctx.lineWidth = 1;
  for (let y = 0; y <= H; y += 16) {
    ctx.beginPath();
    ctx.moveTo(NX - NW/2, y); ctx.lineTo(NX + NW/2, y);
    ctx.stroke();
  }
  // Net mesh lines (vertical inside net)
  for (let x = NX - NW/2 + 2; x <= NX + NW/2 - 2; x += 3) {
    ctx.beginPath();
    ctx.moveTo(x, 0); ctx.lineTo(x, H);
    ctx.stroke();
  }

  // Net top band (white tape)
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(NX - NW/2 - 2, 0, NW + 4, 10);
  ctx.fillRect(NX - NW/2 - 2, H - 10, NW + 4, 10);

  // JAY NETWORK watermark — logo image, centered on each half of the court
  if (jayLogo.complete && jayLogo.naturalWidth > 0) {
    ctx.save();
    const jwY = H / 2;
    const logoSize = 90;
    ctx.globalAlpha = 0.16;
    ctx.drawImage(jayLogo, W/4 - logoSize / 2, jwY - logoSize / 2, logoSize, logoSize);
    ctx.drawImage(jayLogo, 3*W/4 - logoSize / 2, jwY - logoSize / 2, logoSize, logoSize);
    ctx.restore();
  }

  // Net center strap
  ctx.fillStyle = '#e0e0e0';
  ctx.fillRect(NX - 3, H/2 - 10, 6, 20);

  // Net post circles
  ctx.fillStyle = '#bbb';
  ctx.beginPath(); ctx.arc(NX, 5, 6, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(NX, H-5, 6, 0, Math.PI*2); ctx.fill();

  // Net border lines (left/right edges of net)
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(NX - NW/2, 0); ctx.lineTo(NX - NW/2, H);
  ctx.moveTo(NX + NW/2, 0); ctx.lineTo(NX + NW/2, H);
  ctx.stroke();
}

function drawBall(x, y) {
  ctx.beginPath();
  ctx.ellipse(x + 3, y + 5, BALL_R, BALL_R*0.45, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x, y, BALL_R, 0, Math.PI*2);
  const g = ctx.createRadialGradient(x-2.5, y-2.5, 1, x, y, BALL_R);
  g.addColorStop(0, '#f0ff55');
  g.addColorStop(1, '#9fb000');
  ctx.fillStyle = g;
  ctx.fill();

  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(x, y, BALL_R * 0.7, 0.3, Math.PI-0.3); ctx.stroke();
  ctx.beginPath(); ctx.arc(x, y, BALL_R * 0.7, Math.PI+0.3, -0.3); ctx.stroke();
}

function drawPlayer(px, py, isLeft, swing) {
  const cx = px + PADDLE_W/2;
  const cy = py + PADDLE_H/2;
  const shirt = isLeft ? '#4fc3f7' : '#ff7043';
  const shorts = isLeft ? '#0d47a1' : '#b71c1c';
  const skin = '#f5cba7';
  const bx = isLeft ? cx + 16 : cx - 16;
  const headY = cy - 26;
  const racketDir = isLeft ? 1 : -1;
  const sa = swing * 0.5;

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Shadow
  ctx.beginPath();
  ctx.ellipse(bx, cy+30, 13, 5, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fill();

  // Legs
  ctx.strokeStyle = shorts;
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(bx, cy+10); ctx.lineTo(bx-5, cy+30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx, cy+10); ctx.lineTo(bx+5, cy+30); ctx.stroke();

  // Shoes
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(bx-5, cy+30); ctx.lineTo(bx-11, cy+32); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx+5, cy+30); ctx.lineTo(bx+11, cy+32); ctx.stroke();

  // Shorts body
  ctx.fillStyle = shorts;
  ctx.beginPath(); ctx.ellipse(bx, cy+10, 9, 5, 0, 0, Math.PI*2); ctx.fill();

  // Torso
  ctx.strokeStyle = shirt;
  ctx.lineWidth = 9;
  ctx.beginPath(); ctx.moveTo(bx, cy-5); ctx.lineTo(bx, cy+10); ctx.stroke();

  // Racket arm
  const armEndX = bx + racketDir * (15 + Math.sin(sa)*4);
  const armEndY = cy - 6 + Math.cos(sa)*4;
  ctx.strokeStyle = skin;
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(bx, cy-5); ctx.lineTo(armEndX, armEndY); ctx.stroke();

  // Other arm
  ctx.beginPath(); ctx.moveTo(bx, cy-5); ctx.lineTo(bx - racketDir*10, cy+3); ctx.stroke();

  // Racket handle
  const rHx = armEndX + racketDir*8;
  const rHy = armEndY;
  ctx.strokeStyle = '#7b4a1e';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(armEndX, armEndY); ctx.lineTo(rHx, rHy); ctx.stroke();

  // Racket head
  ctx.save();
  ctx.translate(rHx + racketDir*11, rHy);
  ctx.rotate(isLeft ? -0.3 + sa*0.3 : 0.3 - sa*0.3);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.ellipse(0, 0, 10, 15, Math.PI/2, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = 'rgba(200,255,200,0.6)';
  ctx.lineWidth = 1;
  for (let s = -8; s <= 8; s += 4) {
    ctx.beginPath(); ctx.moveTo(s, -14); ctx.lineTo(s, 14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-9, s); ctx.lineTo(9, s); ctx.stroke();
  }
  ctx.restore();

  // Head
  ctx.beginPath(); ctx.arc(bx, headY, 9, 0, Math.PI*2);
  ctx.fillStyle = skin; ctx.fill();

  // Hair
  ctx.fillStyle = isLeft ? '#3b1f00' : '#111';
  ctx.beginPath(); ctx.arc(bx, headY-2, 9, Math.PI, 0); ctx.fill();

  // Eyes
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(bx + racketDir*3, headY, 1.5, 0, Math.PI*2); ctx.fill();

  // Wristband
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(armEndX, armEndY, 3, 0, Math.PI*2); ctx.stroke();
}

function drawHUD() {
  // Flash overlay
  if (flashTimer > 0) {
    ctx.fillStyle = flashColor === 'red'
      ? `rgba(200,0,0,${flashTimer/18 * 0.3})`
      : `rgba(247,201,72,${flashTimer/18 * 0.25})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Speed indicator
  const currentSpd = Math.sqrt(ball.vx**2 + ball.vy**2).toFixed(1);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(W/2 + 20, H - 28, 90, 22);
  ctx.fillStyle = '#888';
  ctx.font = '11px Courier New';
  ctx.fillText(`⚡ ${currentSpd} kec.`, W/2 + 26, H - 13);
}

// ========== RENDER LOOP ==========
function draw() {
  ctx.save();
  if (shakeTimer > 0) ctx.translate(shakeX, shakeY);
  ctx.clearRect(-10, -10, W+20, H+20);
  drawCourt();

  const nearLeft = ball.x < W * 0.3 && ball.vx < 0;
  const nearRight = ball.x > W * 0.7 && ball.vx > 0;

  drawPlayer(lp.x, lp.y, true, nearLeft ? swingTimer : 0);
  drawPlayer(rp.x, rp.y, false, nearRight ? swingTimer : 0);
  drawBall(ball.x, ball.y);
  drawHUD();
  ctx.restore();
}

function loop() {
  if (!running) return;
  update();
  draw();
  requestAnimationFrame(loop);
}

// Initial draw
draw();
</script>
