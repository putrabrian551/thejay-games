<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jay Flappy Bird</title>
    <style>
        :root {
            --bg: #09090f;
            --bg2: #13131d;
            --accent: #AB7BFF;
            --text: #F5F5FF;
            --gold: #FBBF24;
            --red: #F87171;
            --green: #34D399;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.01em;}
        h1 span { color: var(--accent); }
        .game-container { position: relative; width: 100%; max-width: 360px; }
        canvas {
            background: var(--bg2);
            border: 2px solid rgba(171, 123, 255, 0.3);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.15);
            display: block;
            width: 100%;
            aspect-ratio: 9/16;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 360px;
            padding: 12px 6px;
            font-weight: 600;
        }
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(9, 9, 15, 0.9);
            backdrop-filter: blur(6px);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            padding: 20px;
            text-align: center;
        }
        .overlay.show { opacity: 1; pointer-events: auto; }
        .instruction-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(171, 123, 255, 0.2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            max-width: 260px;
        }
        .instruction-box p { color: #9898B8; margin-bottom: 8px; font-size: 0.9rem; text-align: left;}
        .instruction-box p:last-child { margin-bottom: 0; }
        .btn {
            background: linear-gradient(135deg, #7C3AED 0%, #AB7BFF 100%);
            color: white; border: none; padding: 12px 32px;
            font-size: 1rem; font-weight: 700; border-radius: 12px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <h1>JAY <span>FLAPPY BIRD</span></h1>

    <div class="game-container">
        <canvas id="birdCanvas" width="360" height="540"></canvas>
        
        <div class="overlay show" id="startScreen">
            <h2>HOW TO PLAY</h2>
            <div class="instruction-box">
                <p>🕹️ <b>Control:</b> Press <b>SPACEBAR</b>, Click Mouse, or <b>TAP screen</b> to flap wings upward.</p>
                <p>🚧 <b>Objective:</b> Navigate through the green cyber pipes without hitting them.</p>
                <p>🏆 <b>Score:</b> Get +1 point for every pipe gate successfully passed.</p>
            </div>
            <button class="btn" id="startBtn">Start Flying</button>
        </div>

        <div class="overlay" id="endScreen">
            <h2 style="font-size:2rem; margin-bottom:8px; font-weight:800; color:var(--red);">GAME OVER</h2>
            <p style="color:#9898B8; margin-bottom:20px; font-size:1.1rem;">Score: <span id="finalScore" style="color:var(--gold); font-weight:bold;">0</span></p>
            <button class="btn" id="restartBtn">Fly Again</button>
        </div>
    </div>

    <div class="stats">
        <div>🪙 Score: <span id="score" style="color:var(--gold)">0</span></div>
        <div>❤️ Lives: <span id="lives" style="color:var(--red)">1</span></div>
    </div>

<script>
const canvas = document.getElementById("birdCanvas");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");
const startScreen = document.getElementById("startScreen");
const startBtn = document.getElementById("startBtn");
const endScreen = document.getElementById("endScreen");
const finalScoreEl = document.getElementById("finalScore");
const restartBtn = document.getElementById("restartBtn");

let bird, pipes, score, lives, gameStarted = false, gameOver = false, frameCount;

// Audio Synthesizer (Web Audio API)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);

    if (type === 'flap') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    } else if (type === 'point') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(650, audioCtx.currentTime);
        osc.frequency.setValueAtTime(950, audioCtx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'hit') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 0.25);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.25);
    }
}

function handleStart() {
    gameStarted = true;
    startScreen.classList.remove("show");
    init();
}

function init() {
    bird = { x: 50, y: 200, radius: 12, velocity: 0, gravity: 0.4, jump: -6.5 };
    pipes = [];
    score = 0;
    lives = 1;
    gameOver = false;
    frameCount = 0;
    
    scoreEl.textContent = score;
    livesEl.textContent = lives;
    endScreen.classList.remove("show");
}

function flap() {
    if (!gameStarted || gameOver) return;
    bird.velocity = bird.jump;
    playSound('flap');
}

window.addEventListener("keydown", (e) => { if (e.code === "Space") { e.preventDefault(); flap(); } });
canvas.addEventListener("mousedown", flap);
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); flap(); }, { passive: false });

function update() {
    if (!gameStarted || gameOver) return;
    frameCount++;

    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    if (bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) {
        lives = 0; livesEl.textContent = lives;
        playSound('hit'); endGame();
    }

    if (frameCount % 110 === 0) {
        const gap = 115;
        const minHeight = 40;
        const maxHeight = canvas.height - gap - minHeight - 60;
        const topPipeHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
        
        pipes.push({
            x: canvas.width,
            topHeight: topPipeHeight,
            bottomY: topPipeHeight + gap,
            width: 52,
            passed: false
        });
    }

    for (let i = pipes.length - 1; i >= 0; i--) {
        const p = pipes[i];
        p.x -= 2;

        if (!p.passed && p.x + p.width < bird.x) {
            score++;
            playSound('point');
            scoreEl.textContent = score;
            p.passed = true;
        }

        if (bird.x + bird.radius > p.x && bird.x - bird.radius < p.x + p.width) {
            if (bird.y - bird.radius < p.topHeight || bird.y + bird.radius > p.bottomY) {
                lives = 0; livesEl.textContent = lives;
                playSound('hit'); endGame();
            }
        }

        if (p.x + p.width < 0) pipes.splice(i, 1);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!gameStarted) {
        // Tampilkan dekorasi burung diam sebelum mulai
        ctx.beginPath();
        ctx.arc(canvas.width/2, canvas.height/2 - 40, 16, 0, Math.PI * 2);
        ctx.fillStyle = "#AB7BFF"; ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5; ctx.stroke();
        return;
    }

    // Pipes
    pipes.forEach(p => {
        ctx.fillStyle = "#34D399";
        ctx.fillRect(p.x, 0, p.width, p.topHeight);
        ctx.fillStyle = "#059669"; ctx.fillRect(p.x - 2, p.topHeight - 12, p.width + 4, 12);
        ctx.fillStyle = "#34D399";
        ctx.fillRect(p.x, p.bottomY, p.width, canvas.height - p.bottomY);
        ctx.fillStyle = "#059669"; ctx.fillRect(p.x - 2, p.bottomY, p.width + 4, 12);
    });

    // Bird
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
    ctx.fillStyle = "#AB7BFF"; ctx.fill();
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.closePath();

    ctx.beginPath();
    ctx.moveTo(bird.x + bird.radius - 2, bird.y - 3);
    ctx.lineTo(bird.x + bird.radius + 8, bird.y);
    ctx.lineTo(bird.x + bird.radius - 2, bird.y + 4);
    ctx.fillStyle = "#FBBF24"; ctx.fill();

    ctx.beginPath(); ctx.arc(bird.x + 4, bird.y - 4, 2, 0, Math.PI * 2); ctx.fillStyle = "#fff"; ctx.fill();
}

function endGame() {
    gameOver = true;
    finalScoreEl.textContent = score;
    endScreen.classList.add("show");
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

startBtn.addEventListener("click", handleStart);
restartBtn.addEventListener("click", init);
loop();
</script>
</body>
</html>
