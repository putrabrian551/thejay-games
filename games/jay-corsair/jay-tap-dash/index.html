<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>Jay Tap Dash</title><style>*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;height:100%;overflow:hidden;background:#080016;font-family:Arial,Helvetica,sans-serif;touch-action:none;user-select:none}canvas{display:block;width:100vw;height:100vh;background:#080016}#menu{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(6,0,20,.76);z-index:10}.card{width:min(90vw,460px);padding:24px;text-align:center;color:#fff;border-radius:24px;background:linear-gradient(180deg,#330073,#10002b);border:2px solid #b84cff;box-shadow:0 0 35px rgba(184,76,255,.45)}h1{font-size:42px;margin-bottom:10px;text-shadow:0 0 20px #b84cff}p{color:#dfc9ff;line-height:1.5;margin:12px 0 20px}button{border:0;border-radius:999px;padding:13px 28px;font-weight:900;color:#200033;background:linear-gradient(90deg,#ffd83d,#b84cff,#45e9ff);cursor:pointer;font-size:16px}#hint{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);padding:9px 15px;border-radius:999px;color:#ead8ff;font-size:13px;background:rgba(35,0,75,.6);border:1px solid rgba(184,76,255,.6);pointer-events:none}</style></head><body><canvas id="game"></canvas><div id="menu"><div class="card"><h1>⚡ JAY TAP DASH</h1><p>Tap anywhere to jump. Collect JAY coins and avoid firewall blocks.</p><button id="start">START DASH</button></div></div><div id="hint">TAP ANYWHERE TO JUMP</div><script>(()=>{const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),menu=document.getElementById('menu'),startBtn=document.getElementById('start');let D,W,H,ground,running=false,frame=0,score=0,best=Number(localStorage.getItem('jay_tap_dash_best')||0),speed=5,spawn=0,stars=[],blocks=[],coins=[],particles=[];const player={x:90,y:0,w:42,h:42,vy:0,onGround:false};function resize(){D=Math.min(devicePixelRatio||1,2);W=canvas.width=Math.floor(innerWidth*D);H=canvas.height=Math.floor(innerHeight*D);canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';ctx.setTransform(D,0,0,D,0,0);ground=innerHeight-90;player.y=ground-player.h;makeStars()}function rand(a,b){return Math.random()*(b-a)+a}function makeStars(){stars=[];for(let i=0;i<90;i++)stars.push({x:rand(0,innerWidth),y:rand(0,innerHeight),r:rand(.5,2),s:rand(.2,1),a:rand(.3,1)})}function reset(){running=true;frame=0;score=0;speed=5;spawn=0;blocks=[];coins=[];particles=[];player.y=ground-player.h;player.vy=0;player.onGround=true;menu.style.display='none'}function jump(){if(!running)return;if(player.onGround){player.vy=-15;player.onGround=false;burst(player.x+20,player.y+40,'#b84cff',12)}}startBtn.onclick=reset;addEventListener('pointerdown',e=>{if(e.target!==startBtn)jump()});addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump()}});function burst(x,y,color,n){for(let i=0;i<n;i++)particles.push({x,y,vx:rand(-3,3),vy:rand(-3,3),r:rand(2,5),life:rand(18,36),color})}function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function spawnThings(){blocks.push({x:innerWidth+40,y:ground-46,w:34+Math.min(score/30,35),h:46,color:'#ff3d77'});if(Math.random()<.8)coins.push({x:innerWidth+90,y:ground-rand(105,185),r:15,got:false})}function drawBg(){let g=ctx.createLinearGradient(0,0,0,innerHeight);g.addColorStop(0,'#150038');g.addColorStop(.55,'#24005c');g.addColorStop(1,'#080016');ctx.fillStyle=g;ctx.fillRect(0,0,innerWidth,innerHeight);stars.forEach(s=>{s.x-=s.s;if(s.x<0)s.x=innerWidth;ctx.globalAlpha=s.a;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1});ctx.strokeStyle='rgba(184,76,255,.2)';ctx.lineWidth=2;for(let y=ground;y<innerHeight;y+=22){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(innerWidth,y);ctx.stroke()}ctx.strokeStyle='#45e9ff';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,ground);ctx.lineTo(innerWidth,ground);ctx.stroke()}function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.fill()}function drawPlayer(){ctx.save();ctx.translate(player.x+21,player.y+21);ctx.shadowColor='#b84cff';ctx.shadowBlur=18;ctx.fillStyle='#7d28ff';roundRect(-21,-21,42,42,12);ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='900 28px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('J',0,2);ctx.restore()}function drawBlock(b){ctx.save();ctx.shadowColor=b.color;ctx.shadowBlur=15;ctx.fillStyle=b.color;roundRect(b.x,b.y,b.w,b.h,8);ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='900 18px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('!',b.x+b.w/2,b.y+b.h/2);ctx.restore()}function drawCoin(c){ctx.save();ctx.translate(c.x,c.y);ctx.shadowColor='#ffd83d';ctx.shadowBlur=15;ctx.fillStyle='#ffd83d';ctx.beginPath();ctx.arc(0,0,c.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle='#ff9d00';ctx.lineWidth=4;ctx.stroke();ctx.fillStyle='#704400';ctx.font='900 17px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('J',0,1);ctx.restore()}function drawParticles(){particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life/36);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1})}function drawHud(){ctx.save();ctx.fillStyle='#fff';ctx.shadowColor='#b84cff';ctx.shadowBlur=12;ctx.font='900 24px Arial';ctx.textAlign='left';ctx.fillText('SCORE '+score,22,42);ctx.fillStyle='#ffd83d';ctx.fillText('SPEED '+speed.toFixed(1),22,74);ctx.textAlign='right';ctx.fillStyle='#fff';ctx.fillText('BEST '+best,innerWidth-22,42);ctx.restore()}function update(){frame++;speed+=.002;spawn--;if(spawn<=0){spawnThings();spawn=rand(70,115)-Math.min(score*.3,45)}player.vy+=.75;player.y+=player.vy;if(player.y+player.h>=ground){player.y=ground-player.h;player.vy=0;player.onGround=true}blocks.forEach(b=>b.x-=speed);coins.forEach(c=>c.x-=speed);blocks=blocks.filter(b=>b.x+b.w>-40);coins=coins.filter(c=>c.x+c.r>-40&&!c.got);for(const b of blocks){if(hit(player,b)){endGame();return}}coins.forEach(c=>{if(Math.hypot(player.x+21-c.x,player.y+21-c.y)<34){c.got=true;score+=10;burst(c.x,c.y,'#ffd83d',18);if(score>best){best=score;localStorage.setItem('jay_tap_dash_best',String(best))}}});particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--});particles=particles.filter(p=>p.life>0)}function endGame(){running=false;menu.style.display='flex';menu.innerHTML=`<div class="card"><h1>GAME OVER</h1><p>Score: <b>${score}</b><br>Best: <b>${best}</b></p><button onclick="location.reload()">PLAY AGAIN</button></div>`}function loop(){drawBg();drawPlayer();blocks.forEach(drawBlock);coins.forEach(drawCoin);drawParticles();drawHud();if(running)update();requestAnimationFrame(loop)}addEventListener('resize',resize);resize();loop()})();</script></body></html>
